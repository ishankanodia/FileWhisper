<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232636;
      --border: #2e3248;
      --accent: #5b7fff;
      --accent2: #a78bfa;
      --green: #34d399;
      --red: #f87171;
      --cyan: #00e5ff;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      min-height: 200px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* Mode toggle row */
    .mode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 8px 10px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .mode-label-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
    }

    #modeLabel {
      color: var(--text);
      font-weight: 700;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 11px;
      transition: background 0.2s;
    }

    .toggle.active .toggle-track {
      background: var(--cyan);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .toggle.active .toggle-thumb {
      transform: translateX(18px);
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
      padding: 6px 10px;
      background: var(--surface);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .status-dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .scan-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #1e3a2f, #14532d);
      border: 1px solid #166534;
      color: var(--green);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .scan-btn:hover {
      background: linear-gradient(135deg, #166534, #15803d);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(52, 211, 153, 0.15);
    }

    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .input-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 72px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 10px 12px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--accent); }

    .ask-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #1e2a5e, #1e3a8a);
      border: 1px solid #1d4ed8;
      color: #93c5fd;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .ask-btn:hover {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(91, 127, 255, 0.2);
    }

    .ask-btn:active { transform: translateY(0); }
    .ask-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .response-area {
      margin-top: 14px;
      display: none;
    }

    .response-area.visible { display: block; }

    .question-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      font-style: italic;
    }

    .answer-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      color: var(--text);
      min-height: 40px;
    }

    .follow-up-bubble {
      margin-top: 8px;
      background: linear-gradient(135deg, #1a1d35, #1e2040);
      border: 1px solid #2e3560;
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--accent2);
      font-style: italic;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .dots span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔍</div>
  <div>
    <div class="header-title">RAG PAGE BOT</div>
    <div class="header-sub">Ask anything about this page</div>
  </div>
</div>

<!-- Mode Toggle -->
<div class="mode-row">
  <div class="mode-label-wrap">
    Mode: <span id="modeLabel">Page Mode</span>
  </div>
  <div class="toggle" id="modeToggle">
    <div class="toggle-track"></div>
    <div class="toggle-thumb"></div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Not scanned — click Scan Page to begin</span>
</div>

<button class="scan-btn" id="scan">⚡ Scan Page</button>

<div class="input-wrap">
  <textarea id="question" placeholder="Ask something…"></textarea>
</div>

<button class="ask-btn" id="ask">↩ Ask</button>

<div class="response-area" id="responseArea">
  <div class="question-bubble" id="questionBubble"></div>
  <div id="response"></div>
  <div class="follow-up-bubble" id="followUpBubble" style="display:none;"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
